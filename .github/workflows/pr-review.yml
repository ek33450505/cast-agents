name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review the changed files in this PR for cast-agents. Focus on:
            1. Agent frontmatter completeness (name, description, tools, model, effort)
            2. Status block contract compliance in agent instructions
            3. No hardcoded paths — use $HOME or ~/
            Post findings as a PR comment. Cite file:line for each issue.
