name: Bug Report
description: Report a bug or unexpected behavior in cast-agents
labels: [bug]
title: "[Bug] "
body:
  - type: input
    id: version
    attributes:
      label: cast-agents Version
      placeholder: "e.g. 0.3.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options: [macOS, Linux]
    validations:
      required: true
  - type: input
    id: claude-version
    attributes:
      label: Claude Code Version
      placeholder: "e.g. 1.2.3"
  - type: dropdown
    id: agent
    attributes:
      label: Agent Involved
      options: [code-writer, code-reviewer, debugger, commit, push, planner, orchestrator, researcher, security, test-runner, test-writer, bash-specialist, merge, docs, devops, frontend-qa, morning-briefing, other]
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
